<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAGDB WASM REPL</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; background: #f4f4f9;}
        textarea { width: 100%; max-width: 800px; height: 100px; margin-bottom: 1rem; padding: 0.5rem; font-family: monospace; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output { width: 100%; max-width: 800px; background: #1e1e1e; color: #d4d4d4; padding: 1rem; min-height: 150px; white-space: pre-wrap; font-family: monospace; overflow-x: auto; margin-top: 1rem; margin-bottom: 1rem; }
        #network { width: 100%; max-width: 800px; height: 400px; background: white; border: 1px solid lightgray; }
    </style>
</head>
<body>
    <h1>YAGDB REPL</h1>
    <p>Try running some cypher queries in the WASM version of the graph database!</p>
    <textarea id="queryInput" placeholder="CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})
MATCH (n)-[r]->(m) RETURN n, r, m"></textarea>
    <button id="runBtn">Run Query</button>

    <div id="output">Output will appear here...</div>
    <div id="network"></div>

    <script type="module">
        import init, { execute_query } from './pkg/yagdb.js';

        let network = null;
        let nodesData = new vis.DataSet([]);
        let edgesData = new vis.DataSet([]);

        function initNetwork() {
            const container = document.getElementById('network');
            const data = { nodes: nodesData, edges: edgesData };
            const options = {
                nodes: {
                    shape: 'dot',
                    size: 20,
                    font: { size: 14 }
                },
                edges: {
                    arrows: 'to',
                    font: { size: 12, align: 'middle' }
                }
            };
            network = new vis.Network(container, data, options);
        }

        // Extremely naive parser to pull out Nodes/Edges from output text
        function updateGraphFromOutput(outputText) {
            nodesData.clear();
            edgesData.clear();

            if (!outputText) return;

            const lines = outputText.split('\n');
            const seenNodes = new Set();
            const seenEdges = new Set();

            lines.forEach(line => {
                // Look for nodes: var: Node { labels: [..], properties: {"name": "Alice"} } ... wait, actual format:
                // Node { labels: [1], edges: [0], properties: {"name": "Alice"} }
                // Let's use a loose regex to capture nodes and edges and extract some details.

                // E.g. Node: n: Node { labels: [1], edges: [0], properties: {"name": "Alice"} }
                const nodeMatch = line.match(/^(\w+):\s*Node\s+\{.*properties:\s*(\{.*?\})\s*\}/);
                if (nodeMatch) {
                    const varName = nodeMatch[1];
                    try {
                        const props = JSON.parse(nodeMatch[2]);
                        const id = Object.values(props).join("-") || varName;
                        if (!seenNodes.has(id)) {
                            seenNodes.add(id);
                            nodesData.add({ id: id, label: JSON.stringify(props) });
                        }
                    } catch(e) {}
                }

                // We can also extract Edges. Actually yagdb prints:
                // r: Edge { labels: [0], start: 0, end: 1, properties: {} }
                const edgeMatch = line.match(/^(\w+):\s*Edge\s+\{.*start:\s*(\d+),\s*end:\s*(\d+).*properties:\s*(\{.*?\})\s*\}/);
                if (edgeMatch) {
                    const varName = edgeMatch[1];
                    const start = edgeMatch[2];
                    const end = edgeMatch[3];

                    // The IDs here are internal indices (0, 1) rather than properties.
                    // This makes linking them to the properties we parsed tricky without a proper JSON return.
                    // We'll try to map them simply if we assume the output contains them all sequentially.
                }
            });

            // To properly do visualizer, we really need the graph to return nodes and edges as JSON with IDs,
            // but we can try to do a heuristic if we know the DB is small, or we can just render whatever internal IDs we find
            // Let's do a different pass: match internal IDs if we can.

            let nodesMap = new Map();
            let currentLine = 0;
            let regexNode = /Node\s*\{\s*labels:\s*\[([^\]]*)\],\s*edges:\s*\[([^\]]*)\],\s*properties:\s*(\{.*?\})\s*\}/g;
            let regexEdge = /Edge\s*\{\s*labels:\s*\[([^\]]*)\],\s*start:\s*(\d+),\s*end:\s*(\d+),\s*properties:\s*(\{.*?\})\s*\}/g;

            // Just scan everything
            let nm;
            let nodeIdCounter = 0; // naive
            while ((nm = regexNode.exec(outputText)) !== null) {
                try {
                    let props = JSON.parse(nm[3]);
                    let label = Object.values(props).join(", ");
                    if (!label) label = "Node";

                    // We don't have the Node's true ID from the text output (only its edges).
                    // We'll just push it and hope to link it by properties.
                    // Actually, since we can't get the ID easily, let's just use what we have and link blindly if we must.
                } catch(e){}
            }

            let em;
            while ((em = regexEdge.exec(outputText)) !== null) {
                let startId = parseInt(em[2]);
                let endId = parseInt(em[3]);

                // Add nodes just in case they weren't added
                if (!nodesData.get(startId)) nodesData.add({ id: startId, label: 'Node ' + startId });
                if (!nodesData.get(endId)) nodesData.add({ id: endId, label: 'Node ' + endId });

                let edgeId = startId + "-" + endId;
                if (!edgesData.get(edgeId)) {
                    edgesData.add({ id: edgeId, from: startId, to: endId });
                }
            }

            // Let's do a better job mapping Nodes
            // Since yagdb prints:
            // n: Node { labels: [1], edges: [0], properties: {"name": "Alice"} }
            // Let's modify the WASM execute_query in a real scenario to return JSON,
            // but for now, we'll just extract what we can.
            // We'll just show the graph topology (nodes 0, 1 etc.)
        }

        async function run() {
            await init();
            console.log("WASM Initialized!");

            initNetwork();

            const runBtn = document.getElementById('runBtn');
            const queryInput = document.getElementById('queryInput');
            const outputDiv = document.getElementById('output');

            runBtn.addEventListener('click', () => {
                const queries = queryInput.value.trim().split('\n').filter(q => q.trim() !== '');
                if (queries.length === 0) return;

                let fullResult = "";
                for (let q of queries) {
                    try {
                        const result = execute_query(q);
                        fullResult += "Query: " + q + "\n" + (result || "(Empty Result)") + "\n\n";
                    } catch (e) {
                        fullResult += "Query: " + q + "\nError: " + e + "\n\n";
                    }
                }

                outputDiv.textContent = fullResult;
                updateGraphFromOutput(fullResult);
            });
        }
        run();
    </script>
</body>
</html>
